name: Deploy website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to TransIP
    runs-on: ubuntu-latest

    env:
      SFTP_HOST: ${{ secrets.TRANSIP_SFTP_HOST }}
      SFTP_USER: ${{ secrets.TRANSIP_SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.TRANSIP_SFTP_PASSWORD }}
      SFTP_REMOTE_DIR: ${{ secrets.TRANSIP_SFTP_REMOTE_DIR }}
      SFTP_KNOWN_HOSTS: ${{ secrets.TRANSIP_SFTP_KNOWN_HOSTS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install website dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run website checks
        run: npm run check

      - name: Validate deploy configuration
        shell: bash
        run: |
          set -euo pipefail

          test -n "$SFTP_HOST"
          test -n "$SFTP_USER"
          test -n "$SFTP_PASSWORD"
          test -n "$SFTP_REMOTE_DIR"
          test -n "$SFTP_KNOWN_HOSTS"

          if [ "$SFTP_REMOTE_DIR" = "/" ] || [ "$SFTP_REMOTE_DIR" = "." ]; then
            echo "Refusing to deploy to unsafe remote directory: $SFTP_REMOTE_DIR" >&2
            exit 1
          fi

      - name: Prepare SSH known hosts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SFTP_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Validate generated site
        shell: bash
        run: |
          set -euo pipefail

          test -f dist/index.html
          test -f dist/404.html
          test -f dist/403.html
          test -f dist/500.html
          test -f dist/.htaccess
          grep -Fx 'ErrorDocument 404 /404.html' dist/.htaccess
          grep -Fx 'ErrorDocument 403 /403.html' dist/.htaccess
          grep -Fx 'ErrorDocument 500 /500.html' dist/.htaccess
          test -f dist/sitemap.xml
          test -f dist/robots.txt
          test -f dist/rss.xml

      - name: Install SFTP client
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends lftp

      - name: Deploy via SFTP
        shell: bash
        run: |
          set -euo pipefail

          lftp -u "$SFTP_USER","$SFTP_PASSWORD" "sftp://$SFTP_HOST" <<EOF
          set cmd:fail-exit yes
          set net:max-retries 2
          set net:timeout 20
          mirror --reverse --delete --verbose ./dist/ "$SFTP_REMOTE_DIR"
          put -O "$SFTP_REMOTE_DIR" ./dist/.htaccess
          bye
          EOF

      - name: Post-deploy smoke test
        shell: bash
        run: |
          set -euo pipefail

          SITE_URL="https://projectdelta.nl"

          check_status() {
            local path="$1"
            local expected="$2"
            local required_text="${3:-}"
            local body
            local status

            body="$(mktemp)"
            status="$(curl --location --silent --show-error --max-time 20 --retry 2 --retry-delay 3 --output "$body" --write-out "%{http_code}" "$SITE_URL$path")"

            if [ "$status" != "$expected" ]; then
              echo "Unexpected status for $path: got $status, expected $expected" >&2
              echo "Response body:" >&2
              sed -n '1,80p' "$body" >&2
              rm -f "$body"
              exit 1
            fi

            if [ -n "$required_text" ] && ! grep -F "$required_text" "$body" >/dev/null; then
              echo "Required text not found for $path: $required_text" >&2
              echo "Response body:" >&2
              sed -n '1,80p' "$body" >&2
              rm -f "$body"
              exit 1
            fi

            rm -f "$body"
          }

          check_status "/" "200"
          check_status "/publicaties/" "200"
          check_status "/socials/" "200"
          check_status "/dossiers/wat-te-doen/" "200"
          check_status "/404.html" "200"
          check_status "/403.html" "200"
          check_status "/500.html" "200"
          check_status "/willekeurige-route-test/" "404" "Deze route bestaat niet"
